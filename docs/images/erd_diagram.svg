<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1700" viewBox="0 0 1800 1700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#667085"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .rel { stroke: #667085; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .rel2 { stroke: #98a2b3; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .label { font: 800 15px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #344054; }
      .entity { fill: #ffffff; stroke: #98a2b3; stroke-width: 2; rx: 12; filter: url(#shadow); }
      .headBox { fill: #eaf1ff; stroke: #98a2b3; stroke-width: 2; rx: 12; }
      .headText { font: 800 23px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #101828; }
      .field { font: 500 17px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #344054; }
      .pk { font: 800 17px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #101828; }
      .note { fill: #fff8db; stroke: #eaaa08; stroke-width: 1.6; rx: 12; }
      .noteText { font: 600 16px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #7a4d00; }
      .legend { font: 500 16px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #475467; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1700"/>

  <!-- Relationship lines are drawn first so table boxes stay readable. -->
  <path d="M900 310 V420" class="rel"/>
  <text x="920" y="372" class="label">1:N 작성</text>

  <path d="M1050 165 H1220" class="rel"/>
  <text x="1090" y="142" class="label">1:N 토큰</text>

  <path d="M1050 250 C1125 250 1140 390 1220 390" class="rel"/>
  <text x="1110" y="322" class="label">1:N 알림</text>

  <path d="M900 860 V1035" class="rel"/>
  <text x="920" y="955" class="label">1:N 댓글</text>

  <path d="M965 860 C1060 930 1125 1045 1220 1150" class="rel"/>
  <text x="1045" y="1010" class="label">1:N 관심</text>

  <path d="M760 640 H570" class="rel"/>
  <text x="610" y="615" class="label">1:N 거래</text>

  <path d="M455 805 V960" class="rel"/>
  <text x="480" y="892" class="label">후기 대상</text>

  <path d="M750 240 C610 320 520 450 455 550" class="rel"/>
  <text x="515" y="440" class="label">요청자</text>

  <path d="M750 170 C560 185 400 220 285 270" class="rel"/>
  <text x="430" y="210" class="label">email 인증</text>

  <path d="M750 260 C565 350 430 520 285 720" class="rel"/>
  <text x="420" y="590" class="label">신고자/대상</text>

  <path d="M750 295 C560 455 410 760 285 1010" class="rel"/>
  <text x="420" y="890" class="label">차단자/대상</text>

  <path d="M760 780 C680 1020 645 1260 640 1450" class="rel2"/>
  <text x="650" y="1365" class="label">활동 집계</text>

  <path d="M760 250 C690 520 650 1120 580 1280" class="rel2"/>
  <text x="585" y="1230" class="label">후기 작성자/평가 대상</text>

  <!-- email_verifications -->
  <rect x="70" y="80" width="430" height="250" class="entity"/>
  <path d="M70 92 Q70 80 82 80 H488 Q500 80 500 92 V132 H70 Z" class="headBox"/>
  <text x="95" y="113" class="headText">email_verifications</text>
  <text x="95" y="160" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="95" y="188" class="field">email : VARCHAR(100)</text>
  <text x="95" y="216" class="field">code : VARCHAR(6)</text>
  <text x="95" y="244" class="field">expires_at : DATETIME</text>
  <text x="95" y="272" class="field">verified / used : BIT</text>
  <text x="95" y="300" class="field">created_at : DATETIME</text>

  <rect x="70" y="360" width="430" height="105" class="note"/>
  <text x="95" y="395" class="noteText">회원가입/비밀번호 재설정 이메일 코드 관리</text>
  <text x="95" y="425" class="noteText">users와 FK 없이 email 값으로 검증</text>

  <!-- users -->
  <rect x="750" y="55" width="300" height="255" class="entity"/>
  <path d="M750 67 Q750 55 762 55 H1038 Q1050 55 1050 67 V107 H750 Z" class="headBox"/>
  <text x="775" y="88" class="headText">users</text>
  <text x="775" y="135" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="775" y="160" class="field">name, nickname &lt;UQ&gt;</text>
  <text x="775" y="185" class="field">email &lt;UQ&gt;, password</text>
  <text x="775" y="210" class="field">phone_number &lt;UQ&gt;</text>
  <text x="775" y="235" class="field">location, latitude, longitude</text>
  <text x="775" y="260" class="field">profile_image, fcm_token</text>
  <text x="775" y="285" class="field">notification flags, created_at</text>

  <!-- refresh tokens -->
  <rect x="1220" y="80" width="420" height="205" class="entity"/>
  <path d="M1220 92 Q1220 80 1232 80 H1628 Q1640 80 1640 92 V132 H1220 Z" class="headBox"/>
  <text x="1245" y="113" class="headText">refresh_tokens</text>
  <text x="1245" y="160" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="1245" y="188" class="field">user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="1245" y="216" class="field">token : VARCHAR(255) &lt;UQ&gt;</text>
  <text x="1245" y="244" class="field">expires_at, revoked, created_at</text>

  <!-- notifications -->
  <rect x="1220" y="350" width="470" height="265" class="entity"/>
  <path d="M1220 362 Q1220 350 1232 350 H1678 Q1690 350 1690 362 V402 H1220 Z" class="headBox"/>
  <text x="1245" y="383" class="headText">notifications</text>
  <text x="1245" y="430" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="1245" y="458" class="field">user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="1245" y="486" class="field">type : ENUM, title : VARCHAR(100)</text>
  <text x="1245" y="514" class="field">message : TEXT</text>
  <text x="1245" y="542" class="field">target_type : VARCHAR(50)</text>
  <text x="1245" y="570" class="field">target_id : BIGINT, is_read : BIT</text>
  <text x="1245" y="598" class="field">created_at : DATETIME</text>

  <!-- posts -->
  <rect x="760" y="420" width="410" height="440" class="entity"/>
  <path d="M760 432 Q760 420 772 420 H1158 Q1170 420 1170 432 V472 H760 Z" class="headBox"/>
  <text x="785" y="453" class="headText">posts</text>
  <text x="785" y="500" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="785" y="526" class="field">user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="785" y="552" class="field">title, content, post_type, status</text>
  <text x="785" y="578" class="field">ingredient_name, quantity, price</text>
  <text x="785" y="604" class="field">trade_location, latitude, longitude</text>
  <text x="785" y="630" class="field">distance_km, expiration_date</text>
  <text x="785" y="656" class="field">image_url, deleted</text>
  <text x="785" y="682" class="field">current_participant_count</text>
  <text x="785" y="708" class="field">target_participant_count</text>
  <text x="785" y="734" class="field">deadline_date, created_at</text>

  <!-- trade requests -->
  <rect x="235" y="550" width="335" height="255" class="entity"/>
  <path d="M235 562 Q235 550 247 550 H558 Q570 550 570 562 V602 H235 Z" class="headBox"/>
  <text x="260" y="583" class="headText">trade_requests</text>
  <text x="260" y="630" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="260" y="658" class="field">post_id : BIGINT &lt;FK posts.id&gt;</text>
  <text x="260" y="686" class="field">requester_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="260" y="714" class="field">status : ENUM</text>
  <text x="260" y="742" class="field">created_at, responded_at</text>
  <text x="260" y="770" class="field">completed_at : DATETIME</text>

  <!-- reports -->
  <rect x="70" y="690" width="430" height="235" class="entity"/>
  <path d="M70 702 Q70 690 82 690 H488 Q500 690 500 702 V742 H70 Z" class="headBox"/>
  <text x="95" y="723" class="headText">reports</text>
  <text x="95" y="770" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="95" y="798" class="field">reporter_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="95" y="826" class="field">target_user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="95" y="854" class="field">target_type / target_id</text>
  <text x="95" y="882" class="field">reason, description, status</text>
  <text x="95" y="910" class="field">created_at, reviewed_at</text>

  <!-- user blocks -->
  <rect x="70" y="1000" width="430" height="205" class="entity"/>
  <path d="M70 1012 Q70 1000 82 1000 H488 Q500 1000 500 1012 V1052 H70 Z" class="headBox"/>
  <text x="95" y="1033" class="headText">user_blocks</text>
  <text x="95" y="1080" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="95" y="1108" class="field">blocker_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="95" y="1136" class="field">blocked_user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="95" y="1164" class="field">created_at : DATETIME</text>

  <!-- comments -->
  <rect x="1220" y="705" width="420" height="215" class="entity"/>
  <path d="M1220 717 Q1220 705 1232 705 H1628 Q1640 705 1640 717 V757 H1220 Z" class="headBox"/>
  <text x="1245" y="738" class="headText">comments</text>
  <text x="1245" y="785" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="1245" y="813" class="field">post_id : BIGINT &lt;FK posts.id&gt;</text>
  <text x="1245" y="841" class="field">user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="1245" y="869" class="field">content : TEXT</text>
  <text x="1245" y="897" class="field">created_at : DATETIME</text>

  <!-- favorites -->
  <rect x="1220" y="1030" width="420" height="205" class="entity"/>
  <path d="M1220 1042 Q1220 1030 1232 1030 H1628 Q1640 1030 1640 1042 V1082 H1220 Z" class="headBox"/>
  <text x="1245" y="1063" class="headText">favorites</text>
  <text x="1245" y="1110" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="1245" y="1138" class="field">post_id : BIGINT &lt;FK posts.id&gt;</text>
  <text x="1245" y="1166" class="field">user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="1245" y="1194" class="field">created_at : DATETIME</text>

  <!-- reviews -->
  <rect x="235" y="1280" width="460" height="245" class="entity"/>
  <path d="M235 1292 Q235 1280 247 1280 H683 Q695 1280 695 1292 V1332 H235 Z" class="headBox"/>
  <text x="260" y="1313" class="headText">reviews</text>
  <text x="260" y="1360" class="pk">* id : BIGINT &lt;PK&gt;</text>
  <text x="260" y="1388" class="field">trade_request_id : BIGINT &lt;FK trade_requests.id&gt;</text>
  <text x="260" y="1416" class="field">reviewer_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="260" y="1444" class="field">target_user_id : BIGINT &lt;FK users.id&gt;</text>
  <text x="260" y="1472" class="field">rating : INT, content : TEXT</text>
  <text x="260" y="1500" class="field">created_at : DATETIME</text>

  <!-- badge note -->
  <rect x="810" y="1390" width="430" height="145" class="note"/>
  <text x="835" y="1425" class="noteText">badges / achievements</text>
  <text x="835" y="1455" class="noteText">별도 테이블 없이 활동 데이터 기반 계산</text>
  <text x="835" y="1485" class="noteText">게시글 작성, 거래 완료, 리뷰 평점, 나눔 횟수 집계</text>

  <text x="70" y="1635" class="legend">실선: FK 기반 관계 / 점선: email 또는 활동 집계 기반 논리 관계</text>
</svg>