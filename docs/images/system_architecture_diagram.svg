<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 90 1500 810">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#243447" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="client" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#dcecff"/>
    </linearGradient>
    <linearGradient id="server" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eefaf1"/>
      <stop offset="1" stop-color="#dff4e5"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="1" stop-color="#ffebbf"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2f7"/>
      <stop offset="1" stop-color="#ffe0ec"/>
    </linearGradient>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 800 36px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 500 16px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #667085; }
      .box { stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .client { fill: url(#client); stroke: #6ca8e5; }
      .server { fill: url(#server); stroke: #74b983; }
      .db { fill: url(#db); stroke: #e6aa35; }
      .external { fill: url(#external); stroke: #ea7ca4; }
      .storage { fill: #f2f4f7; stroke: #98a2b3; }
      .head { font: 800 24px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #1d2939; }
      .section { font: 800 16px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #344054; }
      .text { font: 500 15px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #344054; }
      .small { font: 500 13px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #475467; }
      .pill { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #243447; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { font: 800 14px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #243447; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>

  <rect x="70" y="145" width="330" height="425" class="box client"/>
  <text x="100" y="190" class="head">Client / PWA</text>
  <text x="100" y="220" class="section">React + Vite</text>
  <text x="100" y="252" class="text">- 게시글, 거래, 댓글, 리뷰 화면</text>
  <text x="100" y="280" class="text">- 마이페이지, 알림, 신고/차단</text>
  <text x="100" y="308" class="text">- 배지/업적 조회 UI</text>
  <text x="100" y="336" class="text">- JWT Access Token 저장/전송</text>
  <text x="100" y="364" class="text">- Refresh Token 기반 재로그인</text>
  <text x="100" y="392" class="text">- FCM Web Push Token 등록</text>
  <text x="100" y="420" class="text">- Geolocation 좌표 전송</text>
  <text x="100" y="448" class="text">- Kakao Maps 지도/주소 표시</text>

  <rect x="455" y="120" width="455" height="525" class="box server"/>
  <text x="490" y="166" class="head">API Server / Spring Boot</text>

  <rect x="490" y="195" width="365" height="78" class="pill"/>
  <text x="512" y="222" class="section">Controller</text>
  <text x="512" y="248" class="small">Auth, Post, Comment, Trade, Review, Notification,</text>
  <text x="512" y="267" class="small">Moderation, Badge, Admin, Upload API</text>

  <rect x="490" y="292" width="365" height="108" class="pill"/>
  <text x="512" y="319" class="section">Service</text>
  <text x="512" y="345" class="small">위치 반경 검색, 공동구매 인원/마감 처리</text>
  <text x="512" y="367" class="small">알림 생성, 유통기한 임박 스케줄러</text>
  <text x="512" y="389" class="small">이미지 정리, 신고/차단, 배지 진행률 계산</text>

  <rect x="490" y="420" width="365" height="80" class="pill"/>
  <text x="512" y="447" class="section">Security</text>
  <text x="512" y="473" class="small">Spring Security, JWT, RefreshToken, Email Code</text>
  <text x="512" y="493" class="small">Admin API는 X-Admin-Token으로 보호</text>

  <rect x="490" y="520" width="365" height="78" class="pill"/>
  <text x="512" y="547" class="section">Repository / JPA</text>
  <text x="512" y="573" class="small">Spring Data JPA, Pagination, Query Filtering</text>
  <text x="512" y="593" class="small">요청자 좌표 기준 Haversine 거리 계산</text>

  <rect x="985" y="145" width="365" height="425" class="box db"/>
  <text x="1018" y="190" class="head">Database / MySQL</text>
  <text x="1018" y="228" class="text">- users, refresh_tokens</text>
  <text x="1018" y="256" class="text">- email_verifications</text>
  <text x="1018" y="284" class="text">- posts, comments, favorites</text>
  <text x="1018" y="312" class="text">- trade_requests, reviews</text>
  <text x="1018" y="340" class="text">- notifications, notification settings</text>
  <text x="1018" y="368" class="text">- reports, user_blocks</text>
  <text x="1018" y="396" class="text">- 게시글 위치/유통기한/공동구매 상태</text>
  <text x="1018" y="424" class="text">- 배지는 활동 데이터를 기반으로 계산</text>

  <rect x="70" y="645" width="330" height="165" class="box external"/>
  <text x="100" y="688" class="head">Browser / Map APIs</text>
  <text x="100" y="726" class="text">- Geolocation API: 현재 좌표</text>
  <text x="100" y="754" class="text">- Kakao Maps JavaScript API</text>
  <text x="100" y="782" class="text">- 지도, 주소 검색, 위치 표시</text>

  <rect x="455" y="690" width="455" height="120" class="box external"/>
  <text x="490" y="732" class="head">External Services</text>
  <text x="490" y="770" class="text">- SMTP Mail: 이메일 인증 / 비밀번호 재설정 코드</text>
  <text x="490" y="798" class="text">- Firebase FCM: Web Push 알림 발송</text>

  <rect x="985" y="645" width="365" height="165" class="box storage"/>
  <text x="1018" y="688" class="head">File Storage</text>
  <text x="1018" y="726" class="text">- uploads/ 이미지 파일 저장</text>
  <text x="1018" y="754" class="text">- 게시글 이미지 URL 관리</text>
  <text x="1018" y="782" class="text">- 미사용 이미지 정리 API</text>

  <path d="M400 340 C420 340 430 340 455 340" class="arrow"/>
  <text x="407" y="318" class="label">HTTP REST API</text>
  <text x="413" y="338" class="label">fetch + JWT</text>

  <path d="M910 340 C940 340 955 340 985 340" class="arrow"/>
  <text x="925" y="318" class="label">JPA Query / SQL</text>

  <path d="M235 570 C235 608 235 620 235 645" class="arrow"/>
  <text x="250" y="615" class="label">위치/지도</text>

  <path d="M682 645 C682 665 682 670 682 690" class="arrow"/>
  <text x="696" y="674" class="label">메일/푸시</text>

  <path d="M910 548 C950 598 975 623 1010 645" class="arrow"/>
  <text x="935" y="615" class="label">이미지 저장</text>
</svg>