spring:
  application:
    name: foodshare
  config:
    import: optional:file:./application-local.properties
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/foodshare?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-local-development-secret}
    expiration-seconds: 86400
  upload:
    dir: uploads
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    auth-code-expiration-millis: ${spring.mail.auth-code-expiration-millis}
  firebase:
    enabled: ${APP_FIREBASE_ENABLED:true}
    service-account: ${APP_FIREBASE_SERVICE_ACCOUNT:}
  phone-verification:
    recipient-email: ${PHONE_VERIFICATION_RECIPIENT_EMAIL:${MAIL_USERNAME:}}
    expiration-millis: ${PHONE_VERIFICATION_EXPIRATION_MILLIS:600000}
    allowed-domains: ${PHONE_VERIFICATION_ALLOWED_DOMAINS:vmms.nate.com,ktfmms.magicn.com,lguplus.com}
    imap:
      host: ${PHONE_VERIFICATION_IMAP_HOST:imap.gmail.com}
      port: ${PHONE_VERIFICATION_IMAP_PORT:993}
      username: ${PHONE_VERIFICATION_IMAP_USERNAME:${MAIL_USERNAME:}}
      password: ${PHONE_VERIFICATION_IMAP_PASSWORD:${MAIL_PASSWORD:}}
      ssl: ${PHONE_VERIFICATION_IMAP_SSL:true}
