<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="960" viewBox="0 0 1700 960">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#243447" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .box { stroke-width: 2.4; rx: 18; filter: url(#shadow); }
      .client { fill: #e9f4ff; stroke: #5b9ee8; }
      .server { fill: #e9f8ec; stroke: #65b678; }
      .db { fill: #fff0c9; stroke: #e6a21f; }
      .external { fill: #ffeaf2; stroke: #ee6f9d; }
      .storage { fill: #f2f4f7; stroke: #98a2b3; }
      .head { font: 800 27px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #101828; }
      .section { font: 800 18px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #243447; }
      .text { font: 500 17px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #243447; }
      .small { font: 500 15px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #344054; }
      .pill { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #243447; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { font: 800 15px 'Segoe UI', 'Malgun Gothic', Arial, sans-serif; fill: #243447; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="960"/>

  <rect x="70" y="70" width="390" height="455" class="box client"/>
  <text x="105" y="120" class="head">Client / PWA</text>
  <text x="105" y="154" class="section">React + Vite</text>
  <text x="105" y="188" class="text">- 게시글, 거래, 댓글, 리뷰 화면</text>
  <text x="105" y="218" class="text">- 채팅, 냉장고, 알림 화면</text>
  <text x="105" y="248" class="text">- 마이페이지, 신고/차단, 배지 UI</text>
  <text x="105" y="278" class="text">- JWT Access Token 저장/전송</text>
  <text x="105" y="308" class="text">- Refresh Token 기반 재로그인</text>
  <text x="105" y="338" class="text">- FCM Web Push Token 등록</text>
  <text x="105" y="368" class="text">- Geolocation 좌표 전송</text>
  <text x="105" y="398" class="text">- Kakao Maps 지도/주소 표시</text>

  <rect x="590" y="45" width="560" height="610" class="box server"/>
  <text x="630" y="95" class="head">API Server / Spring Boot</text>

  <rect x="630" y="130" width="480" height="92" class="pill"/>
  <text x="655" y="158" class="section">Controller</text>
  <text x="655" y="184" class="small">Auth, Post, Comment, Trade, Chat, Fridge</text>
  <text x="655" y="207" class="small">Review, Notification, Moderation, Badge, Admin, Upload API</text>

  <rect x="630" y="246" width="480" height="118" class="pill"/>
  <text x="655" y="274" class="section">Service</text>
  <text x="655" y="300" class="small">위치 반경 검색, 공동구매 모집마감 처리</text>
  <text x="655" y="323" class="small">1대1/단체 채팅, 읽음/고정/알림끄기</text>
  <text x="655" y="346" class="small">냉장고, 신고/차단, 배지/활동 통계 계산</text>

  <rect x="630" y="388" width="480" height="92" class="pill"/>
  <text x="655" y="416" class="section">Security</text>
  <text x="655" y="442" class="small">Spring Security, JWT, RefreshToken, Email Code</text>
  <text x="655" y="465" class="small">Admin API는 X-Admin-Token으로 보호</text>

  <rect x="630" y="504" width="480" height="92" class="pill"/>
  <text x="655" y="532" class="section">Repository / JPA</text>
  <text x="655" y="558" class="small">Spring Data JPA, Pagination, Query Filtering</text>
  <text x="655" y="581" class="small">요청자 좌표 기준 Haversine 거리 계산</text>

  <rect x="1270" y="70" width="380" height="455" class="box db"/>
  <text x="1305" y="120" class="head">Database / MySQL</text>
  <text x="1305" y="162" class="text">- users, refresh_tokens</text>
  <text x="1305" y="192" class="text">- email_verifications</text>
  <text x="1305" y="222" class="text">- posts, comments, favorites</text>
  <text x="1305" y="252" class="text">- trade_requests, reviews</text>
  <text x="1305" y="282" class="text">- chat_rooms, chat_messages</text>
  <text x="1305" y="312" class="text">- chat_room_members, fridge_items</text>
  <text x="1305" y="342" class="text">- notifications, reports, user_blocks</text>
  <text x="1305" y="372" class="text">- 게시글 위치/유통기한/마감일</text>
  <text x="1305" y="402" class="text">- 배지는 활동 데이터로 계산</text>

  <rect x="70" y="690" width="390" height="170" class="box external"/>
  <text x="105" y="740" class="head">Browser / Map APIs</text>
  <text x="105" y="782" class="text">- Geolocation API: 현재 좌표</text>
  <text x="105" y="812" class="text">- Kakao Maps JavaScript API</text>
  <text x="105" y="842" class="text">- 지도, 주소 검색, 위치 표시</text>

  <rect x="590" y="720" width="560" height="140" class="box external"/>
  <text x="630" y="770" class="head">External Services</text>
  <text x="630" y="812" class="text">- SMTP Mail: 이메일 인증 / 비밀번호 재설정 코드</text>
  <text x="630" y="842" class="text">- Firebase FCM: Web Push 알림 발송</text>

  <rect x="1270" y="690" width="380" height="170" class="box storage"/>
  <text x="1305" y="740" class="head">File Storage</text>
  <text x="1305" y="782" class="text">- uploads/ 이미지 파일 저장</text>
  <text x="1305" y="812" class="text">- 게시글 이미지 URL 관리</text>
  <text x="1305" y="842" class="text">- 미사용 이미지 정리 API</text>

  <path d="M460 300 H590" class="arrow"/>
  <text x="492" y="270" class="label">HTTP REST API</text>
  <text x="505" y="292" class="label">fetch + JWT</text>

  <path d="M1150 300 H1270" class="arrow"/>
  <text x="1174" y="272" class="label">JPA Query / SQL</text>

  <path d="M265 525 V690" class="arrow"/>
  <text x="285" y="617" class="label">위치/지도</text>

  <path d="M870 655 V720" class="arrow"/>
  <text x="890" y="696" class="label">메일/푸시</text>

  <path d="M1150 545 C1205 590 1230 640 1270 715" class="arrow"/>
  <text x="1190" y="635" class="label">이미지 저장</text>
</svg>
