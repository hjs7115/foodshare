spring.datasource.url=jdbc:h2:mem:foodshare-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
app.jwt.secret=foodshare-test-secret-key
app.jwt.expiration-seconds=86400
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=test@example.com
app.mail.auth-code-expiration-millis=1800000
spring.mail.auth-code-expiration-millis=${app.mail.auth-code-expiration-millis}
